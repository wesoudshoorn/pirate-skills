<!--
  SCREENSHOT SECTION REFERENCE
  =============================
  HTML patterns for product screenshot sections. Shows the interface with
  optional benefit callouts below. Read this file to understand the available
  structures, then generate actual content for the user's product by replacing
  {placeholder} tokens with real copy.

  Design system: Tailwind CSS v4. Black/neutral palette. No gradients,
  no shadows, no decorative color. Clean and typographic.

  CONTENT SCHEMA
  ==============
  Required:
    headline   — Section headline. Describe what the screenshot shows or why it matters.
    image      — Description of what the screenshot shows. A designer will replace
                 the placeholder with a real product image.

  Optional:
    description — 1-2 sentences of supporting copy below the headline.
    benefits    — Array<{ title: string, description: string }> — 2-3 items.
                  Short benefit callouts that annotate or explain the screenshot.
                  Use when the UI isn't self-explanatory.

  VARIANT SELECTION GUIDE
  =======================
  default         — Centered headline and description, then a full-width screenshot.
                    Use when the product UI speaks for itself. Let the screenshot do
                    the heavy lifting.
  with-benefits   — Screenshot above, then a 3-column benefit grid below.
                    Use when the UI needs annotation, or when 2-3 features shown in
                    the screenshot deserve callouts.

  WRITING NOTES
  =============
  - The headline should describe the VALUE of what's shown, not just the feature.
    Good: "Every decision, one place"  Bad: "The dashboard"
  - Benefits (if used) should be short — title + 1 sentence. Not full paragraphs.
  - The screenshot placeholder should describe what a designer will actually show,
    e.g. "dashboard with active project list" not just "screenshot".
-->


<!-- ============================================================
     VARIANT 1: default
     Centered headline and description above a full-width screenshot.
     Use when the UI speaks for itself.
     ============================================================ -->
<section class="py-8 md:py-12">

  <!-- Centered copy: headline and optional description -->
  <div class="max-w-2xl mb-10">
    <h2 class="text-3xl md:text-4xl font-bold tracking-tight text-black text-balance">{headline}</h2>
    <p class="mt-4 text-lg text-neutral-600 text-balance">{description}</p>
  </div>

  <!-- Full-width screenshot wireframe (A2 — dashboard with table) -->
  <div class="bg-neutral-100 rounded-2xl aspect-video overflow-hidden relative border border-neutral-200">
    <div class="flex flex-col h-full">
      <!-- Browser chrome -->
      <div class="bg-neutral-200 h-8 flex items-center px-3 gap-1.5 shrink-0">
        <div class="w-2.5 h-2.5 rounded-full bg-neutral-300"></div>
        <div class="w-2.5 h-2.5 rounded-full bg-neutral-300"></div>
        <div class="w-2.5 h-2.5 rounded-full bg-neutral-300"></div>
        <div class="h-3.5 bg-neutral-300 rounded flex-1 max-w-[40%] ml-3"></div>
      </div>
      <!-- App body -->
      <div class="flex flex-1 min-h-0">
        <!-- Sidebar -->
        <div class="w-1/5 bg-neutral-200/40 p-3 space-y-3 shrink-0">
          <div class="h-2 w-3/4 bg-neutral-300/60 rounded"></div>
          <div class="h-2 w-full bg-neutral-300/40 rounded"></div>
          <div class="h-2 w-2/3 bg-neutral-300/40 rounded"></div>
          <div class="h-2 w-5/6 bg-neutral-300/40 rounded"></div>
        </div>
        <!-- Main content: table -->
        <div class="flex-1 p-4 flex flex-col gap-3">
          <!-- Search bar -->
          <div class="h-8 bg-white/60 rounded border border-neutral-200 max-w-[50%]"></div>
          <!-- Table rows -->
          <div class="flex-1 bg-white/60 rounded-lg p-3 space-y-0">
            <div class="flex gap-4 py-2.5 border-b border-neutral-200/60">
              <div class="h-2.5 w-1/4 bg-neutral-200 rounded"></div>
              <div class="h-2.5 w-1/3 bg-neutral-200/60 rounded"></div>
              <div class="h-2.5 w-1/6 bg-neutral-200/60 rounded"></div>
            </div>
            <div class="flex gap-4 py-2.5 border-b border-neutral-200/60">
              <div class="h-2.5 w-1/3 bg-neutral-200 rounded"></div>
              <div class="h-2.5 w-1/4 bg-neutral-200/60 rounded"></div>
              <div class="h-2.5 w-1/5 bg-neutral-200/60 rounded"></div>
            </div>
            <div class="flex gap-4 py-2.5 border-b border-neutral-200/60">
              <div class="h-2.5 w-1/4 bg-neutral-200 rounded"></div>
              <div class="h-2.5 w-1/3 bg-neutral-200/60 rounded"></div>
              <div class="h-2.5 w-1/4 bg-neutral-200/60 rounded"></div>
            </div>
            <div class="flex gap-4 py-2.5">
              <div class="h-2.5 w-1/3 bg-neutral-200 rounded"></div>
              <div class="h-2.5 w-1/4 bg-neutral-200/60 rounded"></div>
              <div class="h-2.5 w-1/6 bg-neutral-200/60 rounded"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <span class="absolute bottom-2 right-3 text-[10px] text-neutral-300">[img: {image}]</span>
  </div>

</section>


<!-- ============================================================
     VARIANT 2: with-benefits
     Screenshot above, benefit callouts below.
     Use when the UI needs annotation or features need naming.
     ============================================================ -->
<section class="py-8 md:py-12">

  <!-- Centered copy: headline and optional description -->
  <div class="max-w-2xl mb-10">
    <h2 class="text-3xl md:text-4xl font-bold tracking-tight text-black text-balance">{headline}</h2>
    <p class="mt-4 text-lg text-neutral-600 text-balance">{description}</p>
  </div>

  <!-- Full-width screenshot wireframe (A1 — dashboard with chart) -->
  <div class="bg-neutral-100 rounded-2xl aspect-video overflow-hidden relative border border-neutral-200 mb-10">
    <div class="flex flex-col h-full">
      <!-- Browser chrome -->
      <div class="bg-neutral-200 h-8 flex items-center px-3 gap-1.5 shrink-0">
        <div class="w-2.5 h-2.5 rounded-full bg-neutral-300"></div>
        <div class="w-2.5 h-2.5 rounded-full bg-neutral-300"></div>
        <div class="w-2.5 h-2.5 rounded-full bg-neutral-300"></div>
        <div class="h-3.5 bg-neutral-300 rounded flex-1 max-w-[40%] ml-3"></div>
      </div>
      <!-- App body -->
      <div class="flex flex-1 min-h-0">
        <!-- Sidebar -->
        <div class="w-1/5 bg-neutral-200/40 p-3 space-y-3 shrink-0">
          <div class="h-2 w-3/4 bg-neutral-300/60 rounded"></div>
          <div class="h-2 w-full bg-neutral-300/40 rounded"></div>
          <div class="h-2 w-2/3 bg-neutral-300/40 rounded"></div>
          <div class="h-2 w-5/6 bg-neutral-300/40 rounded"></div>
        </div>
        <!-- Main content -->
        <div class="flex-1 p-4 flex flex-col gap-3">
          <!-- Stat cards row -->
          <div class="flex gap-3">
            <div class="flex-1 bg-white/60 rounded-lg p-3 space-y-2">
              <div class="h-2 w-12 bg-neutral-300/60 rounded"></div>
              <div class="h-3 w-16 bg-neutral-200 rounded"></div>
            </div>
            <div class="flex-1 bg-white/60 rounded-lg p-3 space-y-2">
              <div class="h-2 w-10 bg-neutral-300/60 rounded"></div>
              <div class="h-3 w-14 bg-neutral-200 rounded"></div>
            </div>
            <div class="flex-1 bg-white/60 rounded-lg p-3 space-y-2">
              <div class="h-2 w-14 bg-neutral-300/60 rounded"></div>
              <div class="h-3 w-12 bg-neutral-200 rounded"></div>
            </div>
          </div>
          <!-- Bar chart area -->
          <div class="flex-1 bg-white/60 rounded-lg p-4 flex items-end gap-2">
            <div class="w-full h-[40%] bg-neutral-200/80 rounded-sm"></div>
            <div class="w-full h-[65%] bg-neutral-200/80 rounded-sm"></div>
            <div class="w-full h-[35%] bg-neutral-200/80 rounded-sm"></div>
            <div class="w-full h-[80%] bg-neutral-200/80 rounded-sm"></div>
            <div class="w-full h-[55%] bg-neutral-200/80 rounded-sm"></div>
            <div class="w-full h-[45%] bg-neutral-200/80 rounded-sm"></div>
          </div>
        </div>
      </div>
    </div>
    <span class="absolute bottom-2 right-3 text-[10px] text-neutral-300">[img: {image}]</span>
  </div>

  <!-- Benefit callouts below the screenshot: 2-3 items -->
  <!-- Adjust grid-cols to match number of benefits (2 or 3). -->
  <div class="grid md:grid-cols-3 gap-6">

    <div>
      <h3 class="font-semibold text-black mb-1">{benefits[0].title}</h3>
      <p class="text-sm text-neutral-600 leading-relaxed">{benefits[0].description}</p>
    </div>

    <div>
      <h3 class="font-semibold text-black mb-1">{benefits[1].title}</h3>
      <p class="text-sm text-neutral-600 leading-relaxed">{benefits[1].description}</p>
    </div>

    <div>
      <h3 class="font-semibold text-black mb-1">{benefits[2].title}</h3>
      <p class="text-sm text-neutral-600 leading-relaxed">{benefits[2].description}</p>
    </div>

    <!-- For 2 benefits: use grid md:grid-cols-2 and remove the third div. -->

  </div>

</section>
